<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PENJUALAN OKTSHOP17</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            margin: 0;
            background: linear-gradient(135deg, #ffe0b2, #ffccbc, #f8bbd0);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .wrap {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        h1 { margin: 0 0 20px; text-align: center; font-size: 22px; color: #e65100; border-bottom: 2px solid #ffccbc; padding-bottom: 10px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-top: 15px; color: #555; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            margin-top: 5px;
            outline: none;
        }
        input:focus { border-color: #ff9800; box-shadow: 0 0 5px rgba(255,152,0,0.2); }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 15px;
            color: #fff;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.3s;
            background: linear-gradient(90deg, #ff5722, #ff9800);
        }
        button:active { transform: scale(0.98); }
        button.secondary { background: linear-gradient(90deg, #1976d2, #512da8); }
        .card { background: #fff; padding: 15px; border-radius: 15px; margin-top: 20px; border: 1px solid #eee; }
        .small { font-size: 11px; color: #888; margin-top: 5px; text-align: center; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .total-grand {
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px dashed #ddd;
            color: #d84315;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
<div class="wrap">
    <h1>OKTSHOP17</h1>

    <label>Tanggal Transaksi</label>
    <input type="date" id="tanggal">

    <label>Penjualan Waroeng Boci (Rp)</label>
    <input type="number" id="boci" placeholder="0">

    <label>Penjualan Lapak Cireng (Rp)</label>
    <input type="number" id="cireng" placeholder="0">

    <button onclick="simpan()">Simpan Data</button>

    <div class="card">
        <div class="total-row"><span>Waroeng Boci:</span> <span id="totalBoci">Rp0</span></div>
        <div class="total-row"><span>Lapak Cireng:</span> <span id="totalCireng">Rp0</span></div>
        <div class="total-grand"><span>TOTAL:</span> <span id="totalSemua">Rp0</span></div>
    </div>

    <div class="card">
        <h3 style="font-size: 16px; margin-top: 0;">Cetak Laporan PDF</h3>
        <label>Dari Tanggal</label>
        <input type="date" id="fromDate">
        <label>Sampai Tanggal</label>
        <input type="date" id="toDate">
        <div class="small">Data diambil dari memori browser ini</div>
        <button class="secondary" onclick="downloadPDF()">Download Rekap (.pdf)</button>
    </div>
</div>

<script>
    // Auto-set today's date
    document.getElementById('tanggal').valueAsDate = new Date();
    document.getElementById('fromDate').valueAsDate = new Date();
    document.getElementById('toDate').valueAsDate = new Date();

    let data = JSON.parse(localStorage.getItem("data_penjualan_oktshop17")) || [];

    function rupiah(n){
        return "Rp" + Number(n).toLocaleString("id-ID");
    }

    function renderTotal(){
        let totalBoci = data.reduce((a,b)=>a + Number(b.boci),0);
        let totalCireng = data.reduce((a,b)=>a + Number(b.cireng),0);
        let totalSemua = totalBoci + totalCireng;

        document.getElementById("totalBoci").innerText = rupiah(totalBoci);
        document.getElementById("totalCireng").innerText = rupiah(totalCireng);
        document.getElementById("totalSemua").innerText = rupiah(totalSemua);
    }

    function simpan(){
        let tanggal = document.getElementById("tanggal").value;
        let boci = Number(document.getElementById("boci").value || 0);
        let cireng = Number(document.getElementById("cireng").value || 0);

        if(!tanggal){
            alert("Pilih tanggal dulu");
            return;
        }

        data.push({tanggal, boci, cireng});
        localStorage.setItem("data_penjualan_oktshop17", JSON.stringify(data));

        document.getElementById("boci").value = "";
        document.getElementById("cireng").value = "";

        renderTotal();
        alert("Data berhasil disimpan ke memori HP/Browser");
    }

    function downloadPDF(){
        let from = document.getElementById("fromDate").value;
        let to = document.getElementById("toDate").value;

        if(!from || !to){
            alert("Lengkapi rentang tanggal");
            return;
        }

        let hasil = data.filter(x => x.tanggal >= from && x.tanggal <= to);

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(18);
        doc.text("REKAP PENJUALAN OKTSHOP17", 10, 20);
        doc.setFontSize(11);
        doc.text(`Periode: ${from} s/d ${to}`, 10, 28);
        
        doc.line(10, 32, 200, 32); // Horizontal line

        let y = 40;
        let total = 0;

        doc.setFont(undefined, 'bold');
        doc.text("Tanggal", 10, y);
        doc.text("Boci", 50, y);
        doc.text("Cireng", 80, y);
        doc.text("Subtotal", 120, y);
        doc.setFont(undefined, 'normal');
        
        y += 10;

        if(hasil.length === 0){
            doc.text("Tidak ada data pada periode ini.", 10, y);
        } else {
            hasil.forEach((d)=>{
                let sub = Number(d.boci) + Number(d.cireng);
                total += sub;

                doc.text(d.tanggal, 10, y);
                doc.text(rupiah(d.boci), 50, y);
                doc.text(rupiah(d.cireng), 80, y);
                doc.text(rupiah(sub), 120, y);
                y += 8;

                if(y > 270){ doc.addPage(); y = 20; }
            });

            y += 10;
            doc.line(10, y-5, 200, y-5);
            doc.setFontSize(14);
            doc.setFont(undefined, 'bold');
            doc.text("GRAND TOTAL: " + rupiah(total), 10, y);
        }

        doc.save(`Rekap_OKTSHOP17_${from}_to_${to}.pdf`);
    }

    renderTotal();
</script>
</body>
</html>
